name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Gradle, JDK 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Test
        run: ./gradlew test
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test
          retention-days: 7

# Frontend job intentionally omitted — added in Task 05 once
# frontend/package.json + pnpm-lock.yaml exist. Gating it via
# `hashFiles()` + `cache-dependency-path` to a non-existent file
# triggered "workflow file issue" validation failures.
